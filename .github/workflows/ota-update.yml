name: Publish OTA Update

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'app.json'

jobs:
  publish-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Publish OTA Update
        run: npx eas-cli@latest update --branch production --auto --skip-dependency-check
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
