name: Publish OTA Update

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'app.json'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Debug - Check environment
        run: |
          echo "Node version:"
          node --version
          echo "NPM version:"
          npm --version
          echo "EXPO_TOKEN is set: ${{ secrets.EXPO_TOKEN != '' }}"

      - name: Publish OTA Update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Starting OTA update..."
          npx -y eas-cli@latest update --channel production --non-interactive 2>&1 || true
          echo "Update command completed"
